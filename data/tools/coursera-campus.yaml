discount:
  summary: Institutional Coursera for Campus licensing for universities—not an individual student self-serve discount.
  details: >
    coursera.org/campus markets employability-focused course access, Professional Certificates,
    Career Academy, and LMS integration for higher-ed institutions via sales. No individual
    student discount percentage or free Plus tier is published on this page. Learners may use
    course financial aid or Coursera Plus consumer promos separately (not campus-specific).

how_to_apply: |
  1. University administrators review https://www.coursera.org/campus
  2. Contact Coursera sales via on-page forms for Campus / Career Academy.
  3. Students: access courses through your institution if licensed, or use consumer coursera.org enrollment options.

regional_restrictions:
  notes: Campus contracts are institution-specific; consumer Coursera Plus availability varies by country.

