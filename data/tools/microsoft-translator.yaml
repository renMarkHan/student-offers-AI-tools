discount:
  summary: Free consumer Translator apps and monthly text API trial; no dedicated student discount SKU on the Translator product page.
  details: >
    microsoft.com/translator describes free mobile apps, live captioning for inclusive classrooms,
    and a free monthly text translation API trial via Azure AI Services. Students building apps can
    use Azure for Students ($100 credit) or institutional Azure education grants—see
    microsoft-azure-students.yaml and google-cloud-education-grants.yaml for separate programs.

how_to_apply: |
  1. Use Translator apps from https://www.microsoft.com/en-us/translator/
  2. For API development, start the Azure free trial linked from the Translator page or Azure for Students.
  3. Do not list student discount rates on Translator unless Microsoft publishes a dedicated education SKU.

