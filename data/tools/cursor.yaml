discount:
  summary: One free year of Cursor Pro for eligible university students (.edu email + SheerID).
  details: >
    Includes Pro features (see cursor.com/docs/account/pricing), including $20 of model
    usage per month during the student year. After 12 months, subscription renews at the
    regular Pro price unless cancelled. Existing Pro subscribers may receive prorated refund
    when switching per Cursor Students FAQ.

how_to_apply: |
  1. Create or use a Cursor account whose email matches your valid .edu university email.
  2. Visit https://cursor.com/students and click "Verify Status", or open https://cursor.com/dashboard → Student Verification.
  3. Complete SheerID student verification.
  4. Subscribe to Cursor Pro in account settings after verification if you do not already have Pro.

regional_restrictions:
  notes: >
    Only .edu email addresses qualify; no exceptions for other academic domains per official help.
    SheerID country rules apply.

source_url: https://cursor.com/help/account-and-billing/student-discount
