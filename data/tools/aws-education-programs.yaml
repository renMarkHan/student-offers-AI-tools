name: AWS Education Programs
website: https://aws.amazon.com
about: Entry point for AWS student and educator cloud programs.
slug: aws-education-programs

category:
  l1: platforms-bundles
  l2: student-programs

discount:
  summary: AWS education hub linking free AWS Educate learning for individuals and separate institutional credit programs (e.g. Education Equity Initiative).
  details: >
    aws.amazon.com/education/ describes AWS offerings for learners, K–12, higher education, research,
    and EdTech. Individual learners can use AWS Educate (free hands-on labs, no credit card, age 13+
    with email)—see aws-educate.yaml. Organizations may apply for AWS Education Equity Initiative
    credits (up to $10,000 per application for new AWS applicants)—see aws-education-equity-initiative.yaml.
    This page does not publish a single dollar amount for all students.

how_to_apply: |
  Individual learning:
  1. Start at https://aws.amazon.com/education/awseducate/ and register for AWS Educate.

  Institutional / nonprofit builders:
  1. Review https://aws.amazon.com/about-aws/our-impact/education-equity-initiative/
  2. Submit the official application if your organization qualifies.

  Higher education procurement:
  1. Contact AWS education experts via https://aws.amazon.com/government-education/contact/ for campus solutions.

regional_restrictions:
  notes: Program availability varies; AWS Educate job board features require learners 18+.

source_url: https://aws.amazon.com/education/
verified_at: 2026-05-17
status: active

eligibility: Depends on pathway—open individual Educate vs. organization-only equity credits.
proof_required: Email for Educate; organizational application for equity initiative.
offer_type: other
related_tools:
  - aws-educate
  - aws-education-equity-initiative
notes: Hub record—do not list credit amounts here unless documented on aws.amazon.com/education/ itself.
