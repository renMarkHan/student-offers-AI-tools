status: active

eligibility: >
  Part-time or full-time students at accredited institutions working toward associate, bachelor's,
  master's, doctoral, or equivalent degree; approved homeschool; qualifying non-degree students.
proof_required: Proof of student status at time of purchase (per Wolfram support article).
