how_to_apply: |
  1. Ask your law library whether the school subscribes to vLex or vLex Library.
  2. If subscribed, sign in using institutional SSO, campus network, or library proxy instructions.
  3. For institutional trials or procurement, use https://us.vlex.com/law-schools (demo/trial for the school).
  4. Do not list student discount percentages unless vLex publishes an official individual student offer page.

